---
version: 2

updates:
  - package-ecosystem: github-actions
    directory: /

    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: UTC

    cooldown:
      default-days: 7

    open-pull-requests-limit: 5

    commit-message:
      prefix: chore

    labels:
      - dependencies
      - github-actions

    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: gitsubmodule
    directory: /

    schedule:
      interval: weekly
      day: monday
      time: "05:30"
      timezone: UTC

    cooldown:
      default-days: 7

    open-pull-requests-limit: 5

    commit-message:
      prefix: chore

    labels:
      - dependencies
      - submodules

    groups:
      github-actions:
        patterns:
          - "*"
